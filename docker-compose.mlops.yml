# Extended MLOps services for production pipeline
# Usage: docker-compose -f docker-compose.yml -f docker-compose.mlops.yml up -d

version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: ./mlops/airflow
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://postgres:postgres@postgres:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/1
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Connection to backend services
    BACKEND_API_URL: http://backend:8000
    MLFLOW_TRACKING_URI: http://mlflow:5000
    FEAST_SERVER_URL: http://feast-server:6566
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    REDIS_HOST: redis
    REDIS_PORT: 6379
    # S3/MinIO for artifacts
    AWS_ACCESS_KEY_ID: minioadmin
    AWS_SECRET_ACCESS_KEY: minioadmin
    MLFLOW_S3_ENDPOINT_URL: http://minio:9000
  volumes:
    - ./mlops/airflow/dags:/opt/airflow/dags
    - ./mlops/airflow/operators:/opt/airflow/plugins/operators
    - ./mlops/airflow/config:/opt/airflow/config
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ============================================
  # APACHE AIRFLOW SERVICES
  # ============================================

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        # Create Airflow database
        airflow db init
        # Create admin user
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
        # Create connections
        airflow connections add 'backend_api' \
          --conn-type 'http' \
          --conn-host 'backend' \
          --conn-port '8000' \
          --conn-schema 'http'
        airflow connections add 'mlflow' \
          --conn-type 'http' \
          --conn-host 'mlflow' \
          --conn-port '5000' \
          --conn-schema 'http'
        airflow connections add 'feast_server' \
          --conn-type 'http' \
          --conn-host 'feast-server' \
          --conn-port '6566' \
          --conn-schema 'http'
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    user: "0:0"
    profiles:
      - init

  airflow-webserver:
    <<: *airflow-common
    container_name: sf_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: sf_airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    container_name: sf_airflow_worker
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    container_name: sf_airflow_triggerer
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ============================================
  # FEAST FEATURE STORE
  # ============================================

  feast-server:
    build:
      context: ./mlops/feast
      dockerfile: Dockerfile
    container_name: sf_feast_server
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: feast
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "6566:6566"
    volumes:
      - ./mlops/feast:/app/feast_repo
      - feast_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6566/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: feast -c /app/feast_repo serve -h 0.0.0.0 -p 6566

  # ============================================
  # MONITORING STACK
  # ============================================

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: sf_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./mlops/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./mlops/monitoring/prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5

  grafana:
    image: grafana/grafana:10.2.0
    container_name: sf_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel
    volumes:
      - ./mlops/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./mlops/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./mlops/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3000/api/health | grep ok"]
      interval: 30s
      timeout: 10s
      retries: 5

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: sf_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./mlops/monitoring/alertmanager:/etc/alertmanager
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Model metrics exporter
  model-metrics-exporter:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sf_model_metrics_exporter
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    ports:
      - "8001:8001"
    volumes:
      - ./mlops/monitoring/exporters:/app/exporters
    command: python -m mlops.monitoring.exporters.model_metrics
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # ============================================
  # DVC REMOTE (uses existing MinIO)
  # ============================================

  # MinIO bucket creation for DVC
  minio-init:
    image: minio/mc:latest
    container_name: sf_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/mlflow-artifacts;
      mc mb --ignore-existing myminio/dvc-storage;
      mc mb --ignore-existing myminio/feast-offline;
      mc mb --ignore-existing myminio/sales-forecasting-artifacts;
      mc anonymous set download myminio/mlflow-artifacts;
      exit 0;
      "
    profiles:
      - init

  # ============================================
  # ADDITIONAL DATABASES
  # ============================================

  # Airflow metadata database (separate from main postgres)
  # Using the same postgres instance with separate database
  postgres-init-airflow:
    image: postgres:16-alpine
    container_name: sf_postgres_init_airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
    command: >
      psql -c "SELECT 'CREATE DATABASE airflow' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'airflow')\\gexec" &&
      psql -c "SELECT 'CREATE DATABASE feast' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'feast')\\gexec"
    profiles:
      - init

volumes:
  airflow_logs:
  feast_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  default:
    name: sales_forecasting_network
