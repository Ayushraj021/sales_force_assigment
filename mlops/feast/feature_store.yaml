# Feast Feature Store Configuration
# https://docs.feast.dev/reference/feature-repository

project: sales_forecasting
registry: data/registry.db
provider: local

online_store:
  type: redis
  connection_string: ${REDIS_HOST}:${REDIS_PORT}

offline_store:
  type: postgres
  host: ${POSTGRES_HOST}
  port: ${POSTGRES_PORT}
  database: ${POSTGRES_DB}
  db_schema: feast
  user: ${POSTGRES_USER}
  password: ${POSTGRES_PASSWORD}

entity_key_serialization_version: 2

# Flags for feature validation
flags:
  alpha_features: true
  on_demand_transforms: true
