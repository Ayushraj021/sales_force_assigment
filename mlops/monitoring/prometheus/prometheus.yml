# Prometheus Configuration for Sales Forecasting MLOps

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'sales-forecasting-monitor'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Rule files
rule_files:
  - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend API metrics
  - job_name: 'backend-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'sales-forecasting-api'

  # Model metrics exporter
  - job_name: 'model-metrics'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'model-metrics-exporter'

  # Celery worker metrics
  - job_name: 'celery-workers'
    static_configs:
      - targets: ['celery_worker:9808']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'celery-worker'

  # Airflow metrics
  - job_name: 'airflow'
    static_configs:
      - targets: ['airflow-webserver:8080']
    metrics_path: /admin/metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'airflow'

  # MLflow metrics
  - job_name: 'mlflow'
    static_configs:
      - targets: ['mlflow:5000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'mlflow-server'

  # PostgreSQL metrics (via postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgres'

  # Redis metrics (via redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'redis'

  # MinIO metrics
  - job_name: 'minio'
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'minio'

  # Node exporter (host metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'host'

  # Kubernetes service discovery (when running in K8s)
  # - job_name: 'kubernetes-pods'
  #   kubernetes_sd_configs:
