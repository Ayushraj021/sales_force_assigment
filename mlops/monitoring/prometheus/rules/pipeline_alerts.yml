# Prometheus alerting rules for ML pipelines

groups:
  - name: airflow_dags
    interval: 1m
    rules:
      # DAG failure
      - alert: AirflowDAGFailure
        expr: airflow_dag_run_state{state="failed"} > 0
        for: 1m
        labels:
          severity: critical
          team: ml-engineering
        annotations:
          summary: "Airflow DAG failure"
          description: "DAG {{ $labels.dag_id }} has failed runs"
          runbook_url: "https://wiki.company.com/runbooks/airflow-dag-failure"

      # DAG running too long
      - alert: AirflowDAGRunningTooLong
        expr: airflow_dag_run_duration_seconds{state="running"} > 7200
        for: 5m
        labels:
          severity: warning
          team: ml-engineering
        annotations:
          summary: "Airflow DAG running too long"
          description: "DAG {{ $labels.dag_id }} has been running for {{ $value | humanizeDuration }}"

      # DAG stuck
      - alert: AirflowDAGStuck
        expr: airflow_dag_run_duration_seconds{state="running"} > 14400
        for: 5m
        labels:
          severity: critical
          team: ml-engineering
        annotations:
          summary: "Airflow DAG stuck"
          description: "DAG {{ $labels.dag_id }} appears to be stuck (running for {{ $value | humanizeDuration }})"

      # Task failure rate
      - alert: AirflowTaskFailureRateHigh
        expr: |
          (
            sum(rate(airflow_task_instance_state{state="failed"}[1h])) by (dag_id)
            /
            sum(rate(airflow_task_instance_state[1h])) by (dag_id)
          ) > 0.1
        for: 15m
        labels:
          severity: warning
          team: ml-engineering
        annotations:
          summary: "High Airflow task failure rate"
          description: "DAG {{ $labels.dag_id }} task failure rate is {{ $value | humanizePercentage }}"

  - name: celery_workers
    interval: 30s
    rules:
      # No active workers
      - alert: CeleryNoActiveWorkers
        expr: celery_workers_total == 0
        for: 2m
        labels:
          severity: critical
          team: ml-engineering
        annotations:
          summary: "No active Celery workers"
          description: "All Celery workers are down"

      # Worker queue backed up
      - alert: CeleryQueueBackedUp
        expr: celery_queue_length > 100
        for: 10m
        labels:
          severity: warning
          team: ml-engineering
        annotations:
          summary: "Celery queue backed up"
          description: "Queue {{ $labels.queue_name }} has {{ $value }} pending tasks"

      # Task retry rate high
      - alert: CeleryHighRetryRate
        expr: |
          (
            sum(rate(celery_task_retried_total[5m])) by (task_name)
            /
            sum(rate(celery_task_total[5m])) by (task_name)
          ) > 0.1
        for: 10m
        labels:
          severity: warning
          team: ml-engineering
        annotations:
          summary: "High Celery task retry rate"
          description: "Task {{ $labels.task_name }} retry rate is {{ $value | humanizePercentage }}"

  - name: mlflow
    interval: 1m
    rules:
      # MLflow server down
      - alert: MLflowServerDown
        expr: up{job="mlflow"} == 0
        for: 2m
        labels:
          severity: critical
          team: ml-engineering
        annotations:
          summary: "MLflow server is down"
          description: "MLflow tracking server has been down for more than 2 minutes"

      # MLflow experiment storage high
      - alert: MLflowStorageHigh
        expr: mlflow_artifact_storage_bytes / mlflow_artifact_storage_bytes_limit > 0.8
        for: 1h
        labels:
          severity: warning
          team: ml-engineering
        annotations:
          summary: "MLflow storage approaching limit"
          description: "MLflow artifact storage is at {{ $value | humanizePercentage }} capacity"

  - name: infrastructure
    interval: 30s
    rules:
      # Database connection pool exhausted
      - alert: DatabaseConnectionPoolExhausted
        expr: postgres_stat_activity_count >= postgres_settings_max_connections * 0.9
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "PostgreSQL has {{ $value }} active connections (90% of max)"

      # Redis memory high
      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is at {{ $value | humanizePercentage }}"

      # MinIO storage high
      - alert: MinIOStorageHigh
        expr: minio_bucket_usage_total_bytes / minio_bucket_quota_total_bytes > 0.8
        for: 1h
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "MinIO storage approaching limit"
          description: "MinIO bucket {{ $labels.bucket }} is at {{ $value | humanizePercentage }} capacity"

  - name: training_pipeline
    interval: 1m
    rules:
      # Training job failed
      - alert: TrainingJobFailed
        expr: training_job_status{status="failed"} > 0
        for: 1m
        labels:
          severity: critical
          team: ml-engineering
        annotations:
          summary: "Training job failed"
          description: "Training job {{ $labels.job_id }} for model {{ $labels.model_name }} has failed"

      # Training taking too long
      - alert: TrainingTakingTooLong
        expr: training_job_duration_seconds{status="running"} > 10800
        for: 5m
        labels:
          severity: warning
          team: ml-engineering
        annotations:
          summary: "Training job taking too long"
          description: "Training job {{ $labels.job_id }} has been running for {{ $value | humanizeDuration }}"

      # No training runs in 24h (if expected)
      - alert: NoRecentTrainingRuns
        expr: time() - max(training_job_last_completed_timestamp) > 86400
        for: 1h
        labels:
          severity: warning
          team: ml-engineering
        annotations:
          summary: "No recent training runs"
          description: "No training jobs have completed in the last 24 hours"
