# Prometheus alerting rules for ML models

groups:
  - name: model_performance
    interval: 30s
    rules:
      # Model MAPE degradation
      - alert: ModelMAPEDegradation
        expr: model_mape > 0.15
        for: 10m
        labels:
          severity: warning
          team: ml-engineering
        annotations:
          summary: "Model MAPE exceeds threshold"
          description: "Model {{ $labels.model_name }} MAPE is {{ $value | printf \"%.2f\" }} (threshold: 0.15) for the last 10 minutes"
          runbook_url: "https://wiki.company.com/runbooks/model-mape-degradation"

      # Model MAPE critical
      - alert: ModelMAPECritical
        expr: model_mape > 0.25
        for: 5m
        labels:
          severity: critical
          team: ml-engineering
        annotations:
          summary: "Model MAPE critically high"
          description: "Model {{ $labels.model_name }} MAPE is {{ $value | printf \"%.2f\" }} (critical threshold: 0.25)"
          runbook_url: "https://wiki.company.com/runbooks/model-mape-critical"

      # Model RMSE degradation
      - alert: ModelRMSEDegradation
        expr: model_rmse > 5000
        for: 10m
        labels:
          severity: warning
          team: ml-engineering
        annotations:
          summary: "Model RMSE exceeds threshold"
          description: "Model {{ $labels.model_name }} RMSE is {{ $value | printf \"%.0f\" }} (threshold: 5000)"

  - name: model_inference
    interval: 15s
    rules:
      # High inference latency (P99)
      - alert: ModelLatencyHigh
        expr: histogram_quantile(0.99, sum(rate(model_inference_latency_seconds_bucket[5m])) by (le, model_name)) > 0.5
        for: 5m
        labels:
          severity: warning
          team: ml-engineering
        annotations:
          summary: "High model inference latency"
          description: "Model {{ $labels.model_name }} P99 latency is {{ $value | printf \"%.2f\" }}s (threshold: 0.5s)"

      # Very high inference latency
      - alert: ModelLatencyCritical
        expr: histogram_quantile(0.99, sum(rate(model_inference_latency_seconds_bucket[5m])) by (le, model_name)) > 1.0
        for: 2m
        labels:
          severity: critical
          team: ml-engineering
        annotations:
          summary: "Critical model inference latency"
          description: "Model {{ $labels.model_name }} P99 latency is {{ $value | printf \"%.2f\" }}s (critical threshold: 1.0s)"

      # High error rate
      - alert: ModelErrorRateHigh
        expr: |
          (
            sum(rate(model_prediction_errors_total[5m])) by (model_name)
            /
            sum(rate(model_predictions_total[5m])) by (model_name)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          team: ml-engineering
        annotations:
          summary: "High model error rate"
          description: "Model {{ $labels.model_name }} error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      # Critical error rate
      - alert: ModelErrorRateCritical
        expr: |
          (
            sum(rate(model_prediction_errors_total[5m])) by (model_name)
            /
            sum(rate(model_predictions_total[5m])) by (model_name)
          ) > 0.10
        for: 2m
        labels:
          severity: critical
          team: ml-engineering
        annotations:
          summary: "Critical model error rate"
          description: "Model {{ $labels.model_name }} error rate is {{ $value | humanizePercentage }} (critical threshold: 10%)"

  - name: data_drift
    interval: 1m
    rules:
      # Data drift detected
      - alert: DataDriftDetected
        expr: data_drift_score > 0.5
        for: 15m
        labels:
          severity: warning
          team: ml-engineering
        annotations:
          summary: "Data drift detected"
          description: "Data drift score is {{ $value | printf \"%.3f\" }} (threshold: 0.5). Consider retraining the model."
          runbook_url: "https://wiki.company.com/runbooks/data-drift"

      # Feature drift
      - alert: FeatureDriftDetected
        expr: feature_drift_p_value < 0.05
        for: 10m
        labels:
          severity: warning
          team: ml-engineering
        annotations:
          summary: "Feature drift detected"
          description: "Feature {{ $labels.feature_name }} shows drift (p-value: {{ $value | printf \"%.4f\" }})"

      # Concept drift (prediction distribution change)
      - alert: ConceptDriftDetected
        expr: concept_drift_score > 0.3
        for: 30m
        labels:
          severity: warning
          team: ml-engineering
        annotations:
          summary: "Concept drift detected"
          description: "Concept drift score is {{ $value | printf \"%.3f\" }}. Model-reality gap may be increasing."

  - name: model_availability
    interval: 30s
    rules:
      # Model not serving
      - alert: ModelNotServing
        expr: up{job="model-metrics"} == 0
        for: 2m
        labels:
          severity: critical
          team: ml-engineering
        annotations:
          summary: "Model service is down"
          description: "Model metrics endpoint has been down for more than 2 minutes"

      # Low prediction throughput
      - alert: LowPredictionThroughput
        expr: sum(rate(model_predictions_total[5m])) < 1
        for: 10m
        labels:
          severity: warning
          team: ml-engineering
        annotations:
          summary: "Low prediction throughput"
          description: "Model prediction rate is {{ $value | printf \"%.2f\" }}/s (expected: > 1/s)"
