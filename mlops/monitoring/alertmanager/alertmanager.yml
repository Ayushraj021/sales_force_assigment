# Alertmanager configuration for Sales Forecasting MLOps
# Handles routing and notification of alerts from Prometheus

global:
  # The smarthost and SMTP sender used for mail notifications
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alertmanager@sales-forecasting.local'
  smtp_auth_username: 'alertmanager@sales-forecasting.local'
  smtp_auth_password: 'smtp-password'  # Override in production
  smtp_require_tls: true

  # Slack webhook URL (configure in production)
  slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

  # Time to wait before sending a notification for a group
  resolve_timeout: 5m

# Route tree
route:
  # Default receiver
  receiver: 'default-receiver'

  # How to group alerts
  group_by: ['alertname', 'severity', 'service']

  # How long to wait to buffer alerts before sending
  group_wait: 30s

  # How long to wait before sending notification for new alerts in group
  group_interval: 5m

  # How long to wait before sending again if alert persists
  repeat_interval: 4h

  # Child routes for different severities and types
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Model performance alerts
    - match:
        service: ml-model
      receiver: 'ml-team'
      group_by: ['alertname', 'model_name']
      group_wait: 1m
      repeat_interval: 2h

    # Pipeline failure alerts
    - match:
        service: airflow
      receiver: 'mlops-team'
      group_by: ['alertname', 'dag_id']
      group_wait: 30s
      repeat_interval: 1h

    # Data drift alerts
    - match:
        alertname: DataDriftDetected
      receiver: 'ml-team'
      group_wait: 5m
      repeat_interval: 6h

    # Infrastructure alerts
    - match:
        service: infrastructure
      receiver: 'ops-team'
      group_wait: 1m
      repeat_interval: 30m

# Receivers define where alerts are sent
receivers:
  # Default receiver for development
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://backend:8000/api/v1/webhooks/alerts'
        send_resolved: true

  # Critical alerts channel
  - name: 'critical-alerts'
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        title: '{{ template "slack.default.title" . }}'
        text: '{{ template "slack.default.text" . }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
    webhook_configs:
      - url: 'http://backend:8000/api/v1/webhooks/alerts/critical'
        send_resolved: true

  # ML team notifications
  - name: 'ml-team'
    slack_configs:
      - channel: '#ml-alerts'
        send_resolved: true
        title: 'ML Alert: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Model:* {{ .Labels.model_name }}
          {{ end }}
    webhook_configs:
      - url: 'http://backend:8000/api/v1/webhooks/alerts/ml'
        send_resolved: true

  # MLOps team notifications
  - name: 'mlops-team'
    slack_configs:
      - channel: '#mlops-alerts'
        send_resolved: true
        title: 'Pipeline Alert: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *DAG:* {{ .Labels.dag_id }}
          *Status:* {{ .Status }}
          {{ end }}
    webhook_configs:
      - url: 'http://backend:8000/api/v1/webhooks/alerts/pipeline'
        send_resolved: true

  # Ops team notifications
  - name: 'ops-team'
    slack_configs:
      - channel: '#ops-alerts'
        send_resolved: true
    webhook_configs:
      - url: 'http://backend:8000/api/v1/webhooks/alerts/ops'
        send_resolved: true

# Inhibition rules prevent notifications for dependent alerts
inhibit_rules:
  # Inhibit less severe alerts when critical is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']

  # Inhibit model alerts when pipeline is down
  - source_match:
      alertname: 'AirflowSchedulerDown'
    target_match:
      service: 'ml-model'
    equal: ['environment']

  # Inhibit drift alerts during retraining
  - source_match:
      alertname: 'TrainingJobRunning'
    target_match:
      alertname: 'DataDriftDetected'
    equal: ['model_name']

# Templates for notification formatting
templates:
  - '/etc/alertmanager/templates/*.tmpl'
