# Production environment values

global:
  environment: production

replicaCount: 3

image:
  tag: "stable"

ingress:
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: sales-forecasting.company.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sales-forecasting-prod-tls
      hosts:
        - sales-forecasting.company.com

resources:
  limits:
    cpu: 4000m
    memory: 8Gi
  requests:
    cpu: 1000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

env:
  - name: ENVIRONMENT
    value: "production"
  - name: DEBUG
    value: "false"
  - name: LOG_LEVEL
    value: "INFO"
  - name: LOG_FORMAT
    value: "json"

externalDatabase:
  host: postgres-prod.database.svc.cluster.local
  port: 5432
  database: sales_forecasting

externalRedis:
  host: redis-prod.cache.svc.cluster.local
  port: 6379

celeryWorker:
  replicaCount: 4
  resources:
    limits:
      cpu: 4000m
      memory: 8Gi
    requests:
      cpu: 1000m
      memory: 2Gi

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - sales-forecasting
        topologyKey: kubernetes.io/hostname

podDisruptionBudget:
  enabled: true
  minAvailable: 2

serviceMonitor:
  enabled: true
  interval: 15s
  labels:
    release: prometheus-prod

networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: database
        - namespaceSelector:
            matchLabels:
              name: cache
