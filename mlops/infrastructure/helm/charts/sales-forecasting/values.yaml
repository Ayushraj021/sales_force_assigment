# Default values for sales-forecasting
# This is a YAML-formatted file.

# Global settings
global:
  environment: development
  imageRegistry: ghcr.io/company

# Application settings
replicaCount: 2

image:
  repository: ghcr.io/company/sales-forecasting
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# Service configuration
service:
  type: ClusterIP
  port: 8000
  annotations: {}

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: sales-forecasting.company.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sales-forecasting-tls
      hosts:
        - sales-forecasting.company.com

# Resource limits
resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

# Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - sales-forecasting
          topologyKey: kubernetes.io/hostname

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /api/health/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Environment variables
env:
  - name: ENVIRONMENT
    value: "development"
  - name: DEBUG
    value: "false"
  - name: LOG_LEVEL
    value: "INFO"
  - name: LOG_FORMAT
    value: "json"

# Environment variables from secrets
envFrom:
  - secretRef:
      name: sales-forecasting-secrets

# ConfigMap data
config:
  APP_NAME: "Sales Forecasting API"
  APP_VERSION: "1.0.0"
  WORKERS: "4"

# Secrets (values should be base64 encoded or use external secrets)
secrets:
  create: true
  data:
    SECRET_KEY: ""  # Set via --set or values override
    POSTGRES_PASSWORD: ""
    REDIS_PASSWORD: ""

# External secrets (if using External Secrets Operator)
externalSecrets:
  enabled: false
  secretStore:
    name: vault-backend
    kind: ClusterSecretStore
  data: []

# Deployment strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Service Monitor for Prometheus Operator
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus

# Database configuration (if using embedded)
postgresql:
  enabled: false
  auth:
    postgresPassword: ""
    database: sales_forecasting
  primary:
    persistence:
      size: 20Gi

# Redis configuration (if using embedded)
redis:
  enabled: false
  auth:
    enabled: true
    password: ""
  master:
    persistence:
      size: 5Gi

# External database configuration
externalDatabase:
  host: postgres
  port: 5432
  database: sales_forecasting
  username: postgres
  existingSecret: ""
  existingSecretPasswordKey: ""

# External Redis configuration
externalRedis:
  host: redis
  port: 6379
  existingSecret: ""
  existingSecretPasswordKey: ""

# MLflow configuration
mlflow:
  trackingUri: "http://mlflow:5000"

# S3/MinIO configuration
s3:
  endpointUrl: "http://minio:9000"
  bucket: "sales-forecasting-artifacts"
  region: "us-east-1"
  existingSecret: ""

# Celery worker configuration
celeryWorker:
  enabled: true
  replicaCount: 2
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  queues: "default,ml"

# Celery beat configuration
celeryBeat:
  enabled: true
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Network policies
networkPolicy:
  enabled: false
  ingress: []
  egress: []
