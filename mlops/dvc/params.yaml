# DVC Pipeline Parameters
# These parameters are tracked by DVC and trigger re-runs when changed

# Data Extraction Parameters
extract:
  start_date: "2022-01-01"
  end_date: "2024-12-31"
  data_sources:
    - postgres
    - s3

# Data Validation Parameters
validate:
  expectation_suite: "sales_data_suite"
  fail_on_error: true

# Feature Engineering Parameters
features:
  adstock_alpha: 0.5
  saturation_lambda: 0.8
  lag_periods: [1, 7, 14, 28, 365]
  rolling_windows: [7, 14, 30]
  include_fourier: true
  fourier_order: 5

# Data Split Parameters
split:
  test_size: 0.15
  validation_size: 0.15
  time_series_split: true
  gap_days: 0

# Prophet Model Parameters
prophet:
  changepoint_prior_scale: 0.05
  seasonality_prior_scale: 10.0
  seasonality_mode: "multiplicative"
  holidays_prior_scale: 10.0
  yearly_seasonality: true
  weekly_seasonality: true
  daily_seasonality: false

# ARIMA Model Parameters
arima:
  p: 2
  d: 1
  q: 2
  seasonal_order: [1, 1, 1, 52]
  enforce_stationarity: true
  enforce_invertibility: true

# PyMC MMM Model Parameters
pymc_mmm:
  adstock_alpha: 0.5
  saturation_lambda: 0.8
  n_samples: 2000
  n_chains: 4
  target_accept: 0.9
  prior_scale: 1.0

# Ensemble Parameters
ensemble:
  method: "weighted_average"  # weighted_average, stacking, blending
  optimize_weights: true
  cv_folds: 5

# Model Registration Parameters
register:
  model_name: "sales-forecast-ensemble"
  stage: "Staging"
  description: "Sales forecasting ensemble model"

# Quality Gate Thresholds
quality_gates:
  mape_threshold: 0.15
  rmse_threshold: 5000
  mape_improvement_pct: 2.0
  latency_p99_ms: 500
