# DVC Pipeline Configuration for Sales Forecasting MLOps
# https://dvc.org/doc/user-guide/project-structure/pipelines-files

stages:
  # Stage 1: Data Extraction
  extract_data:
    cmd: python -m mlops.dvc.stages.extract_data
    deps:
      - mlops/dvc/stages/extract_data.py
    params:
      - extract.start_date
      - extract.end_date
      - extract.data_sources
    outs:
      - data/raw/sales_data.parquet
      - data/raw/marketing_data.parquet
      - data/raw/channel_data.parquet
    metrics:
      - data/raw/extraction_metrics.json:
          cache: false

  # Stage 2: Data Validation
  validate_data:
    cmd: python -m mlops.dvc.stages.validate_data
    deps:
      - mlops/dvc/stages/validate_data.py
      - data/raw/sales_data.parquet
      - data/raw/marketing_data.parquet
      - mlops/validation/great_expectations/expectations/
    params:
      - validate.expectation_suite
      - validate.fail_on_error
    outs:
      - data/validated/sales_data.parquet
      - data/validated/marketing_data.parquet
    metrics:
      - data/validated/validation_report.json:
          cache: false

  # Stage 3: Feature Engineering
  engineer_features:
    cmd: python -m mlops.dvc.stages.engineer_features
    deps:
      - mlops/dvc/stages/engineer_features.py
      - data/validated/sales_data.parquet
      - data/validated/marketing_data.parquet
    params:
      - features.adstock_alpha
      - features.saturation_lambda
      - features.lag_periods
      - features.rolling_windows
    outs:
      - data/features/training_features.parquet
      - data/features/feature_metadata.json
    plots:
      - data/features/feature_distributions.json:
          x: feature_name
          y: mean_value

  # Stage 4: Data Split
  split_data:
    cmd: python -m mlops.dvc.stages.split_data
    deps:
      - mlops/dvc/stages/split_data.py
      - data/features/training_features.parquet
    params:
      - split.test_size
      - split.validation_size
      - split.time_series_split
    outs:
      - data/split/train.parquet
      - data/split/validation.parquet
      - data/split/test.parquet
    metrics:
      - data/split/split_info.json:
          cache: false

  # Stage 5a: Train Prophet Model
  train_prophet:
    cmd: python -m mlops.dvc.stages.train_model --model-type prophet
    deps:
      - mlops/dvc/stages/train_model.py
      - data/split/train.parquet
      - data/split/validation.parquet
    params:
      - prophet.changepoint_prior_scale
      - prophet.seasonality_prior_scale
      - prophet.seasonality_mode
    outs:
      - models/prophet/model.pkl
      - models/prophet/metrics.json
    metrics:
      - models/prophet/metrics.json:
          cache: false
    plots:
      - models/prophet/predictions.csv:
          x: date
          y:
            - actual
            - predicted

  # Stage 5b: Train ARIMA Model
  train_arima:
    cmd: python -m mlops.dvc.stages.train_model --model-type arima
    deps:
      - mlops/dvc/stages/train_model.py
      - data/split/train.parquet
      - data/split/validation.parquet
    params:
      - arima.p
      - arima.d
      - arima.q
      - arima.seasonal_order
    outs:
      - models/arima/model.pkl
      - models/arima/metrics.json
    metrics:
      - models/arima/metrics.json:
          cache: false
    plots:
      - models/arima/predictions.csv:
          x: date
          y:
            - actual
            - predicted

  # Stage 5c: Train PyMC MMM Model
  train_pymc_mmm:
    cmd: python -m mlops.dvc.stages.train_model --model-type pymc_mmm
    deps:
      - mlops/dvc/stages/train_model.py
      - data/split/train.parquet
      - data/split/validation.parquet
    params:
      - pymc_mmm.adstock_alpha
      - pymc_mmm.saturation_lambda
      - pymc_mmm.n_samples
      - pymc_mmm.n_chains
    outs:
      - models/pymc_mmm/model.pkl
      - models/pymc_mmm/trace.nc
      - models/pymc_mmm/metrics.json
    metrics:
      - models/pymc_mmm/metrics.json:
          cache: false
    plots:
      - models/pymc_mmm/predictions.csv:
          x: date
          y:
            - actual
            - predicted
            - lower_bound
            - upper_bound

  # Stage 6: Create Ensemble
  create_ensemble:
    cmd: python -m mlops.dvc.stages.create_ensemble
    deps:
      - mlops/dvc/stages/create_ensemble.py
      - models/prophet/model.pkl
      - models/arima/model.pkl
      - models/pymc_mmm/model.pkl
      - data/split/validation.parquet
    params:
      - ensemble.method
      - ensemble.optimize_weights
    outs:
      - models/ensemble/config.json
      - models/ensemble/metrics.json
    metrics:
      - models/ensemble/metrics.json:
          cache: false

  # Stage 7: Evaluate Models
  evaluate_models:
    cmd: python -m mlops.dvc.stages.evaluate_models
    deps:
      - mlops/dvc/stages/evaluate_models.py
      - models/prophet/model.pkl
      - models/arima/model.pkl
      - models/pymc_mmm/model.pkl
      - models/ensemble/config.json
      - data/split/test.parquet
    outs:
      - models/evaluation/comparison.json
      - models/evaluation/feature_importance.json
    metrics:
      - models/evaluation/comparison.json:
          cache: false
    plots:
      - models/evaluation/model_comparison.csv:
          x: model
          y:
            - mape
            - rmse
            - r2

  # Stage 8: Register Best Model
  register_model:
    cmd: python -m mlops.dvc.stages.register_model
    deps:
      - mlops/dvc/stages/register_model.py
      - models/evaluation/comparison.json
    params:
      - register.model_name
      - register.stage
    outs:
      - models/registered/model_info.json
    metrics:
      - models/registered/model_info.json:
          cache: false

# Parameters file reference
params:
  - params.yaml
