# Airflow configuration - Most settings are controlled via environment variables
# This file provides defaults for local development

[core]
dags_folder = /opt/airflow/dags
plugins_folder = /opt/airflow/plugins
executor = CeleryExecutor
load_examples = False
default_timezone = UTC
parallelism = 32
max_active_tasks_per_dag = 16
max_active_runs_per_dag = 4

[database]
# Set via AIRFLOW__DATABASE__SQL_ALCHEMY_CONN env var
load_default_connections = False

[webserver]
web_server_host = 0.0.0.0
web_server_port = 8080
expose_config = True
rbac = True
# Set via AIRFLOW__WEBSERVER__SECRET_KEY env var

[scheduler]
dag_dir_list_interval = 60
min_file_process_interval = 30
scheduler_heartbeat_sec = 5
max_tis_per_query = 512

[celery]
# Set broker and result backend via env vars
worker_concurrency = 8
flower_host = 0.0.0.0
flower_port = 5555

[logging]
remote_logging = False
logging_level = INFO
fab_logging_level = WARNING

[metrics]
statsd_on = False

[api]
auth_backends = airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth
enable_experimental_api = False

[operators]
default_owner = airflow
default_cpus = 1
default_ram = 512
default_disk = 512
